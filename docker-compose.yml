# Desenvolvimento local:
#   docker compose up
#
# O frontend ainda nao possui base minima neste repositorio. Quando existir,
# adicione o servico frontend apontando para o diretorio correspondente.
services:
  postgres:
    image: postgres:16-alpine
    container_name: creditoreal_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-creditoreal_crm}
      POSTGRES_USER: ${POSTGRES_USER:-creditoreal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: creditoreal_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: creditoreal_minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-creditoreal_local}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_minio_local_password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: golang:1.22-alpine
    container_name: creditoreal_backend
    working_dir: /app
    command: ["go", "run", "./cmd/api"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-change_me_dev_jwt_secret}
      ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES:-15}
      REFRESH_TOKEN_HOURS: ${REFRESH_TOKEN_HOURS:-168}
      DATABASE_URL: postgres://${POSTGRES_USER:-creditoreal}:${POSTGRES_PASSWORD:-change_me_local_password}@postgres:5432/${POSTGRES_DB:-creditoreal_crm}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-creditoreal-local}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-creditoreal_local}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-change_me_minio_local_password}
      S3_USE_PATH_STYLE: "true"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - .:/app
      - go_pkg_mod:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  migrate:
    image: migrate/migrate:v4.17.1
    profiles: ["tools"]
    container_name: creditoreal_migrate
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://${POSTGRES_USER:-creditoreal}:${POSTGRES_PASSWORD:-change_me_local_password}@postgres:5432/${POSTGRES_DB:-creditoreal_crm}?sslmode=disable",
        "up",
      ]
    volumes:
      - ./migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy

  sqlc:
    image: sqlc/sqlc:1.27.0
    profiles: ["tools"]
    container_name: creditoreal_sqlc
    command: ["generate"]
    working_dir: /src
    volumes:
      - .:/src

volumes:
  postgres_data:
  redis_data:
  minio_data:
  go_pkg_mod:
  go_build_cache:
